<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Analyst Pro — AI-powered data analysis dashboard. Upload CSV files, ask questions in natural language, and get instant insights and visualizations." />
    <title>Analyst Pro | AI Data Analyst Dashboard</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" rel="stylesheet" />
  </head>
  <body>
    <div id="error-box" style="color:red; background:white; position:fixed; z-index:9999; top:0; left:0; padding:20px; display:none;"></div>
    <script>
      window.addEventListener('error', function(e) {
        document.getElementById('error-box').style.display = 'block';
        document.getElementById('error-box').innerHTML += '<p>Error: ' + e.message + '<br>' + e.filename + ':' + e.lineno + '</p>';
      });
      window.addEventListener('unhandledrejection', function(e) {
        document.getElementById('error-box').style.display = 'block';
        document.getElementById('error-box').innerHTML += '<p>Unhandled Rejection: ' + (e.reason && e.reason.message ? e.reason.message : e.reason) + '</p>';
      });
    </script>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
